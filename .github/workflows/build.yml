name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install aiohttp brotli httpx pywebview pyinstaller

      - name: Download ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          $dir = Get-ChildItem -Directory -Filter "ffmpeg-*" | Select-Object -First 1
          Copy-Item "$($dir.FullName)\bin\ffmpeg.exe" ffmpeg.exe

      - name: Download ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/zip"
          unzip -o ffmpeg.zip
          chmod +x ffmpeg

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --noconsole --add-data "static;static" --add-binary "ffmpeg.exe;." --name Bili-Jarvis launcher.pyw

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --onefile --windowed --add-data "static:static" --add-binary "ffmpeg:." --name Bili-Jarvis launcher.pyw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bili-Jarvis-${{ runner.os }}
          path: dist/*
