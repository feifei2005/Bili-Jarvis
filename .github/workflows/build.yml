name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install aiohttp brotli httpx pywebview pyinstaller

      - name: Install macOS extras
        if: runner.os == 'macOS'
        run: pip install pyobjc-framework-WebKit 2>/dev/null || true

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --noconsole --add-data "static;static" --name Bili-Jarvis launcher.pyw

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --onefile --windowed --add-data "static:static" --name Bili-Jarvis launcher.pyw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bili-Jarvis-${{ runner.os }}
          path: dist/*
