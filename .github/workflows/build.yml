name: Build EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install aiohttp brotli httpx pywebview pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --add-data "static;static" --name Bili-Jarvis launcher.pyw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bili-Jarvis
          path: dist/Bili-Jarvis.exe
